<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math 0702 Study Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);min-height:100vh;color:#fff}
.header{background:rgba(255,255,255,.05);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.1);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.header-title{display:flex;align-items:center;gap:12px}
.header-title h1{font-size:18px;color:#fff}
.header-title p{font-size:13px;color:#94a3b8}
.btn{padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:600;font-size:14px;border:none;transition:all .2s}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}
.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.btn-primary:hover{opacity:.9}
.container{max-width:800px;margin:0 auto;padding:24px 16px}
.section-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:20px;margin-bottom:16px;border-left:4px solid var(--accent)}
.section-card h3{color:#fff;font-size:16px;margin-bottom:4px}
.section-card p{color:#94a3b8;font-size:13px}
.section-actions{display:flex;gap:8px;margin-top:12px}
.btn-section{padding:8px 18px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer}
.q-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin-bottom:16px;color:#111}
.q-card.correct{background:#dcfce7}
.q-card.wrong{background:#fee2e2}
.q-card .q-num{font-weight:600;font-size:15px;color:#374151;margin-bottom:8px}
.q-card .q-text{font-size:18px;color:#111;font-family:Georgia,serif;line-height:1.6;margin-bottom:16px}
.q-card input[type=text]{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #d1d5db;font-size:16px;box-sizing:border-box}
.mc-btn{display:block;width:100%;padding:10px 16px;border-radius:8px;border:1px solid #d1d5db;background:#f9fafb;cursor:pointer;text-align:left;font-size:15px;margin-bottom:8px;transition:all .2s}
.mc-btn.selected{border:2px solid #3b82f6;background:#dbeafe}
.result-correct{color:#16a34a;font-weight:600;margin-top:12px}
.result-wrong{color:#dc2626;font-weight:600;margin-top:12px}
.hint{color:#6b7280;font-size:14px;font-style:italic;margin-top:4px}
.progress{background:rgba(255,255,255,.1);border-radius:8px;height:6px;margin-top:12px}
.progress-fill{background:#6366f1;border-radius:8px;height:6px;transition:width .3s}
.score-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:13px;color:#fff;margin-top:8px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px}
.stat{background:rgba(255,255,255,.05);border-radius:10px;padding:16px;text-align:center}
.stat .val{font-size:24px;font-weight:700}
.stat .label{color:#94a3b8;font-size:13px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;padding:28px;max-width:700px;width:100%;max-height:80vh;overflow-y:auto;color:#111}
.modal h2{font-size:22px;margin-bottom:20px}
.modal h3{color:#4b5563;border-bottom:2px solid #e5e7eb;padding-bottom:6px;margin-bottom:10px;margin-top:16px}
.formula-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.formula-item{background:#f3f4f6;padding:8px 12px;border-radius:6px;font-family:monospace;font-size:14px}
.final-score{background:rgba(255,255,255,.05);border-radius:12px;padding:24px;margin-bottom:16px;text-align:center}
.final-score .big{font-size:42px;font-weight:700}
.final-score .sub{color:#94a3b8}
.center{display:flex;gap:12px;justify-content:center}
.solution-box{background:#fffbeb;border:1px solid #fbbf24;border-radius:8px;padding:14px;margin-top:10px}
.solution-box .sol-title{font-weight:700;color:#92400e;margin-bottom:8px;font-size:14px}
.solution-box .sol-step{color:#374151;font-size:14px;padding:6px 0 6px 12px;border-left:3px solid #fbbf24;margin-bottom:4px}
.solution-box .sol-formula{background:#fef3c7;padding:4px 10px;border-radius:6px;font-family:Georgia,monospace;font-size:14px;display:inline-block}
</style>
</head>

<script>
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=a=>a[Math.floor(Math.random()*a.length)];
const shuffle=a=>[...a].sort(()=>Math.random()-.5);

const generators={
"0.1":[
()=>{
  const types=["rational","irrational","integer","whole","prime","even integer"];
  const t=pick(types);
  const nums=[rand(-9,9),rand(-9,-1),`${rand(1,9)}/${rand(2,9)}`,`\u221A${pick([2,3,5,7,11])}`,"0","\u03C0",String(rand(2,20))];
  const n=pick(nums);
  const isR=v=>!v.includes("\u221A")&&v!=="\u03C0";
  const isIr=v=>v.includes("\u221A")||v==="\u03C0";
  const isInt=v=>!v.includes("/")&&!v.includes("\u221A")&&v!=="\u03C0"&&Number.isInteger(Number(v));
  const isW=v=>isInt(v)&&Number(v)>=0;
  const isP=v=>{const x=Number(v);if(!Number.isInteger(x)||x<2)return false;for(let i=2;i*i<=x;i++)if(x%i===0)return false;return true};
  const isE=v=>isInt(v)&&Number(v)%2===0;
  const c={"rational":isR,"irrational":isIr,"integer":isInt,"whole":isW,"prime":isP,"even integer":isE};
  const ans=c[t](n)?"Yes":"No";
  const defs={"rational":"A <span class='sol-formula'>rational</span> number can be written as a fraction a/b (b\u22600).","irrational":"An <span class='sol-formula'>irrational</span> number cannot be written as a fraction \u2014 its decimal never terminates or repeats.","integer":"An <span class='sol-formula'>integer</span> is a number with no fractional part: ..., -2, -1, 0, 1, 2, ...","whole":"A <span class='sol-formula'>whole</span> number is a non-negative integer: 0, 1, 2, 3, ...","prime":"A <span class='sol-formula'>prime</span> number is an integer > 1 divisible only by 1 and itself.","even integer":"An <span class='sol-formula'>even integer</span> is an integer divisible by 2."};
  const reasons={"rational":isR(n)?`${n} can be expressed as a fraction, so it IS rational.`:`${n} involves \u221A or \u03C0, producing a non-terminating non-repeating decimal, so it is NOT rational.`,"irrational":isIr(n)?`${n} involves \u221A or \u03C0, so it IS irrational.`:`${n} can be written as a fraction, so it is NOT irrational.`,"integer":isInt(n)?`${n} has no fractional part, so it IS an integer.`:`${n} is a fraction, radical, or \u03C0 \u2014 NOT an integer.`,"whole":isW(n)?`${n} is a non-negative integer, so it IS a whole number.`:(isInt(n)?`${n} is negative, so it is NOT a whole number.`:`${n} is not an integer, so it is NOT a whole number.`),"prime":isP(n)?`${n} > 1 and only divisible by 1 and itself, so it IS prime.`:`${n} is not prime (either \u22641, not an integer, or has other factors).`,"even integer":isE(n)?`${n} is an integer divisible by 2, so it IS even.`:`${n} is either not an integer or not divisible by 2 \u2014 NOT an even integer.`};
  return{question:`Is ${n} a ${t} number?`,answer:ans,choices:["Yes","No"],type:"mc",hint:`Think about the definition of ${t} numbers.`,steps:[`<b>Step 1 \u2014 Recall the definition:</b> ${defs[t]}`,`<b>Step 2 \u2014 Apply to ${n}:</b> ${reasons[t]}`,`<b>Answer: ${ans}</b>`]}
},
()=>{
  const a=rand(-8,3),b=a+rand(2,8);
  const f=pick([
    {i:`x < ${b}`,v:`(-\u221E, ${b})`,h:"< = open paren",s:[`<b>Step 1:</b> x < ${b} means all numbers less than ${b}.`,`<b>Step 2:</b> No lower bound \u2192 start with <span class='sol-formula'>-\u221E</span> (always open).`,`<b>Step 3:</b> Strict < means ${b} is NOT included \u2192 use <span class='sol-formula'>)</span>.`,`<b>Formula:</b> <span class='sol-formula'>x < b \u2192 (-\u221E, b)</span>`,`<b>Answer: (-\u221E, ${b})</b>`]},
    {i:`x \u2264 ${b}`,v:`(-\u221E, ${b}]`,h:"\u2264 = closed bracket",s:[`<b>Step 1:</b> x \u2264 ${b} means all numbers less than or equal to ${b}.`,`<b>Step 2:</b> No lower bound \u2192 start with <span class='sol-formula'>-\u221E</span> (always open).`,`<b>Step 3:</b> \u2264 means ${b} IS included \u2192 use <span class='sol-formula'>]</span>.`,`<b>Formula:</b> <span class='sol-formula'>x \u2264 b \u2192 (-\u221E, b]</span>`,`<b>Answer: (-\u221E, ${b}]</b>`]},
    {i:`x > ${a}`,v:`(${a}, \u221E)`,h:"> = open",s:[`<b>Step 1:</b> x > ${a} means all numbers greater than ${a}.`,`<b>Step 2:</b> Strict > means ${a} NOT included \u2192 use <span class='sol-formula'>(</span>.`,`<b>Step 3:</b> No upper bound \u2192 end with <span class='sol-formula'>\u221E)</span> (always open).`,`<b>Formula:</b> <span class='sol-formula'>x > a \u2192 (a, \u221E)</span>`,`<b>Answer: (${a}, \u221E)</b>`]},
    {i:`x \u2265 ${a}`,v:`[${a}, \u221E)`,h:"\u2265 = closed",s:[`<b>Step 1:</b> x \u2265 ${a} means all numbers greater than or equal to ${a}.`,`<b>Step 2:</b> \u2265 means ${a} IS included \u2192 use <span class='sol-formula'>[</span>.`,`<b>Step 3:</b> No upper bound \u2192 end with <span class='sol-formula'>\u221E)</span>.`,`<b>Formula:</b> <span class='sol-formula'>x \u2265 a \u2192 [a, \u221E)</span>`,`<b>Answer: [${a}, \u221E)</b>`]},
    {i:`${a} < x < ${b}`,v:`(${a}, ${b})`,h:"Both strict = both open",s:[`<b>Step 1:</b> ${a} < x < ${b} means x is strictly between ${a} and ${b}.`,`<b>Step 2:</b> Both < are strict \u2192 neither endpoint included \u2192 <span class='sol-formula'>( )</span>.`,`<b>Formula:</b> <span class='sol-formula'>a < x < b \u2192 (a, b)</span>`,`<b>Answer: (${a}, ${b})</b>`]},
    {i:`${a} \u2264 x < ${b}`,v:`[${a}, ${b})`,h:"\u2264 = [, < = )",s:[`<b>Step 1:</b> ${a} \u2264 x < ${b} means ${a} is included but ${b} is not.`,`<b>Step 2:</b> \u2264 on left \u2192 <span class='sol-formula'>[</span> &nbsp; < on right \u2192 <span class='sol-formula'>)</span>.`,`<b>Formula:</b> <span class='sol-formula'>a \u2264 x < b \u2192 [a, b)</span>`,`<b>Answer: [${a}, ${b})</b>`]},
    {i:`${a} \u2264 x \u2264 ${b}`,v:`[${a}, ${b}]`,h:"Both \u2264 = both closed",s:[`<b>Step 1:</b> ${a} \u2264 x \u2264 ${b} means both endpoints are included.`,`<b>Step 2:</b> Both \u2264 \u2192 use <span class='sol-formula'>[ ]</span> on both sides.`,`<b>Formula:</b> <span class='sol-formula'>a \u2264 x \u2264 b \u2192 [a, b]</span>`,`<b>Answer: [${a}, ${b}]</b>`]}
  ]);
  return{question:`Write in interval notation: ${f.i}`,answer:f.v,type:"input",hint:f.h,steps:f.s}
},
()=>{
  const a=rand(-10,10),b=rand(-10,10);const inner=a-b;const result=Math.abs(inner);
  return{question:`Evaluate: |${a} - ${b}|`,answer:String(result),type:"input",hint:"Compute inside, then absolute value.",steps:[`<b>Step 1:</b> Compute inside the bars: <span class='sol-formula'>${a} - ${b} = ${inner}</span>`,`<b>Step 2:</b> Take absolute value: <span class='sol-formula'>|${inner}| = ${result}</span>`,`<b>Formula:</b> <span class='sol-formula'>|a| = a if a \u2265 0, |a| = -a if a < 0</span>`,`<b>Answer: ${result}</b>`]}
},
()=>{
  const a=rand(-20,20),b=rand(-20,20);const result=Math.abs(a-b);
  return{question:`Distance between ${a} and ${b} on the number line?`,answer:String(result),type:"input",hint:"Distance = |a - b|",steps:[`<b>Step 1:</b> Use the distance formula: <span class='sol-formula'>distance = |a - b|</span>`,`<b>Step 2:</b> Substitute: <span class='sol-formula'>|${a} - ${b}| = |${a-b}|</span>`,`<b>Step 3:</b> Evaluate: <span class='sol-formula'>|${a-b}| = ${result}</span>`,`<b>Answer: ${result}</b>`]}
},
()=>{
  const a=rand(-8,0),b=rand(1,8);
  if(Math.random()>.5) return{question:`Union: x < ${a} or x \u2265 ${b}`,answer:`(-\u221E, ${a}) \u222A [${b}, \u221E)`,type:"input",hint:"'or' = union \u222A",steps:[`<b>Step 1:</b> "or" means <span class='sol-formula'>union (\u222A)</span> \u2014 combine both sets.`,`<b>Step 2:</b> x < ${a} \u2192 <span class='sol-formula'>(-\u221E, ${a})</span> (strict <, open).`,`<b>Step 3:</b> x \u2265 ${b} \u2192 <span class='sol-formula'>[${b}, \u221E)</span> (\u2265, closed bracket).`,`<b>Step 4:</b> Join with \u222A.`,`<b>Answer: (-\u221E, ${a}) \u222A [${b}, \u221E)</b>`]};
  return{question:`Intersection: x \u2265 ${a} and x < ${b}`,answer:`[${a}, ${b})`,type:"input",hint:"'and' = overlap",steps:[`<b>Step 1:</b> "and" means <span class='sol-formula'>intersection</span> \u2014 find the overlap.`,`<b>Step 2:</b> x \u2265 ${a} gives <span class='sol-formula'>[${a}, \u221E)</span>.`,`<b>Step 3:</b> x < ${b} gives <span class='sol-formula'>(-\u221E, ${b})</span>.`,`<b>Step 4:</b> Overlap is ${a} (included) to ${b} (excluded).`,`<b>Answer: [${a}, ${b})</b>`]}
},
()=>{
  const a=rand(1,10),c=rand(-20,-(a+1));
  return{question:`Simplify |x + ${a}| given x \u2264 ${c}`,answer:`-(x + ${a})`,type:"input",hint:`x+${a} is negative here, so negate`,steps:[`<b>Step 1:</b> Check sign of (x + ${a}) when x \u2264 ${c}.`,`<b>Step 2:</b> If x \u2264 ${c}, then x + ${a} \u2264 ${c} + ${a} = ${c+a}, which is <b>negative</b>.`,`<b>Step 3:</b> Rule: <span class='sol-formula'>|expr| = -(expr) when expr < 0</span>`,`<b>Step 4:</b> So |x + ${a}| = -(x + ${a}).`,`<b>Answer: -(x + ${a})</b>`]}
}
],
"0.2":[
()=>{
  const base=pick([-5,-4,-3,-2,2,3,4,5]),exp=rand(2,4);
  const result=Math.pow(base,exp);const absBase=Math.abs(base);const negResult=-Math.pow(absBase,exp);
  const mulStr=Array(exp).fill(`(${base})`).join(" \u00D7 ");
  const mulStrAbs=Array(exp).fill(String(absBase)).join(" \u00D7 ");
  if(Math.random()>.5) return{question:`Evaluate: (${base})^${exp}`,answer:String(result),type:"input",hint:`Multiply ${base} by itself ${exp} times`,steps:[`<b>Step 1:</b> The base ${base} is inside parentheses, so the sign is part of the base.`,`<b>Step 2:</b> Multiply: <span class='sol-formula'>${mulStr} = ${result}</span>`,exp%2===1&&base<0?`<b>Note:</b> Odd exponent with negative base \u2192 negative result.`:`<b>Note:</b> Even exponent \u2192 result is always positive.`,`<b>Answer: ${result}</b>`]};
  return{question:`Evaluate: -${absBase}^${exp}`,answer:String(negResult),type:"input",hint:"Neg NOT in parens \u2192 apply after power",steps:[`<b>Step 1:</b> The negative is NOT inside parentheses, so compute the power first.`,`<b>Step 2:</b> Compute power: <span class='sol-formula'>${absBase}^${exp} = ${mulStrAbs} = ${Math.pow(absBase,exp)}</span>`,`<b>Step 3:</b> Now apply the negative: <span class='sol-formula'>-${Math.pow(absBase,exp)} = ${negResult}</span>`,`<b>Key rule:</b> <span class='sol-formula'>-a^n means -(a^n), NOT (-a)^n</span>`,`<b>Answer: ${negResult}</b>`]}
},
()=>{
  const v=pick(["x","y","a","b"]),a=rand(2,8),b=rand(2,8);
  return{question:`Simplify: ${v}^${a} \u00B7 ${v}^${b}`,answer:`${v}^${a+b}`,type:"input",hint:"Multiply same base: ADD exponents",steps:[`<b>Step 1:</b> Both terms have the same base <span class='sol-formula'>${v}</span>.`,`<b>Step 2:</b> When multiplying same base, ADD exponents: <span class='sol-formula'>${v}^${a} \u00B7 ${v}^${b} = ${v}^(${a}+${b})</span>`,`<b>Formula:</b> <span class='sol-formula'>x^a \u00B7 x^b = x^(a+b)</span>`,`<b>Step 3:</b> <span class='sol-formula'>${a} + ${b} = ${a+b}</span>`,`<b>Answer: ${v}^${a+b}</b>`]}
},
()=>{
  const v=pick(["x","y","a","s"]),a=rand(5,12),b=rand(2,a-1);
  return{question:`Simplify: ${v}^${a} / ${v}^${b}`,answer:`${v}^${a-b}`,type:"input",hint:"Divide same base: SUBTRACT exponents",steps:[`<b>Step 1:</b> Both terms have the same base <span class='sol-formula'>${v}</span>.`,`<b>Step 2:</b> When dividing same base, SUBTRACT exponents: <span class='sol-formula'>${v}^${a} / ${v}^${b} = ${v}^(${a}-${b})</span>`,`<b>Formula:</b> <span class='sol-formula'>x^a / x^b = x^(a-b)</span>`,`<b>Step 3:</b> <span class='sol-formula'>${a} - ${b} = ${a-b}</span>`,`<b>Answer: ${v}^${a-b}</b>`]}
},
()=>{

},

},
()=>{

},

// Formula modal
if(state.showFormulas){
html+=`<div class="modal-overlay" onclick="toggleFormulas()"><div class="modal" onclick="event.stopPropagation()"><div style="display:flex;justify-content:space-between;align-items:center"><h2>\u{1F4CB} Formula Sheet</h2><button onclick="toggleFormulas()" style="background:none;border:none;font-size:24px;cursor:pointer">\u2715</button></div>`;
formulas.forEach(s=>{html+=`<h3>${s.title}</h3><div class="formula-grid">${s.items.map(i=>`<div class="formula-item">${i}</div>`).join("")}</div>`});
html+=`</div></div>`;
}

// Header
html+=`<div class="header"><div class="header-title"><span style="font-size:28px">\u{1F4D0}</span><div><h1>Math 0702 Study Hub</h1><p>Sections 0.1\u20130.5 \u00B7 Test Prep</p></div></div><div style="display:flex;gap:10px"><button class="btn btn-ghost" onclick="toggleFormulas()">\u{1F4CB} Formulas</button>${state.view!=="menu"?`<button class="btn btn-ghost" onclick="goMenu()">\u2190 Menu</button>`:""}</div></div>`;

html+=`<div class="container">`;

if(state.view==="menu"){
html+=`<div style="text-align:center;margin-bottom:32px"><h1 style="font-size:32px;margin-bottom:8px">\u{1F3AF} Monday Test Prep</h1><p style="color:#94a3b8;font-size:16px">Practice each section or take a full mock exam</p></div>`;

Object.entries(sections).forEach(([k,s])=>{
const score=state.scores[k];
const badge=score!==null?`<div class="score-badge" style="background:${score>=80?"#065f46":score>=60?"#92400e":"#991b1b"}">Last: ${score}%</div>`:"";
html+=`<div class="section-card" style="--accent:${s.color}"><h3>${s.title}</h3><p>${s.topics}</p>${badge}<div class="section-actions"><button class="btn-section" style="background:${s.color};color:#fff;border:none" onclick="startSection('${k}')">Practice</button><button class="btn-section" style="background:transparent;color:${s.color};border:1px solid ${s.color}" onclick="startSection('${k}',true)">Quiz</button></div></div>`;
});

html+=`<button class="btn btn-primary" style="width:100%;padding:16px 24px;font-size:18px;border-radius:12px;margin-top:8px" onclick="startFull()">\u{1F3C6} Full Mock Exam (All Sections)</button>`;
html+=`<div class="stats"><div class="stat"><div class="val">5</div><div class="label">Sections</div></div><div class="stat"><div class="val">95+</div><div class="label">Question Types</div></div><div class="stat"><div class="val">Mon</div><div class="label">Your Test</div></div></div>`;
}

if(state.view==="quiz"){
const title=state.section==="all"?"\u{1F3C6} Full Mock Exam":sections[state.section]?.title;
html+=`<div style="margin-bottom:20px"><h2 style="font-size:22px;margin-bottom:4px">${title}</h2><p id="progress-info" style="color:#94a3b8;font-size:14px">${state.mode==="exam"?"Exam Mode":"Practice Mode"} \u00B7 ${answered}/${state.questions.length} answered</p><div class="progress"><div class="progress-fill" style="width:${(answered/state.questions.length)*100}%"></div></div></div>`;

state.questions.forEach((q,i)=>{
const ua=state.answers[i]||"";
const isCorrect=state.showResults&&ua.toLowerCase().replace(/\s/g,"")===q.answer.toLowerCase().replace(/\s/g,"");
const cls=state.showResults?(isCorrect?"correct":"wrong"):"";

html+=`<div class="q-card ${cls}"><div class="q-num">Question ${i+1}</div><div class="q-text">${q.question}</div>`;

if(q.type==="mc"&&q.choices){
q.choices.forEach(c=>{
html+=`<button class="mc-btn ${ua===c?"selected":""}" onclick="${state.showResults?"":`setAnswer(${i},'${c.replace(/'/g,"\\'")}')`}">${c}</button>`;
});
}else{
html+=`<input type="text" value="${(ua||"").replace(/"/g,"&quot;")}" oninput="typeAnswer(${i},this.value)" placeholder="Type your answer..." ${state.showResults?"disabled":""}/>`;
}

if(state.showResults){
html+=isCorrect?`<div class="result-correct">\u2713 Correct!</div>`:`<div class="result-wrong">\u2717 Answer: ${q.answer}</div>`;
if(!isCorrect&&q.steps){
html+=`<div class="solution-box"><div class="sol-title">\u{1F4DD} How to solve it step by step:</div>${q.steps.map(s=>`<div class="sol-step">${s}</div>`).join("")}</div>`;
}
html+=`<div class="hint">\u{1F4A1} ${q.hint}</div>`;
}
html+=`</div>`;
});

if(!state.showResults){
html+=`<button class="btn btn-primary" style="width:100%;padding:16px;font-size:17px;border-radius:12px;margin-top:8px" onclick="submit()">\u2705 Submit Answers</button>`;
}else{
const correct=state.questions.filter((q,i)=>(state.answers[i]||"").toLowerCase().replace(/\s/g,"")===q.answer.toLowerCase().replace(/\s/g,"")).length;
html+=`<div class="final-score"><div class="big">${correct}/${state.questions.length}</div><div class="sub">Correct</div></div>`;
html+=`<div class="center"><button class="btn btn-primary" onclick="startSection('${state.section==="all"?"0.1":state.section}')">\u{1F504} Try Again</button><button class="btn btn-ghost" onclick="goMenu()">\u2190 Menu</button></div>`;
}
}

html+=`</div>`;
app.innerHTML=html;
}

render();
</script>
</body>
</html>
