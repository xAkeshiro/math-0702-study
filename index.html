<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math 0702 Study Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);min-height:100vh;color:#fff}
.header{background:rgba(255,255,255,.05);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.1);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.header-title{display:flex;align-items:center;gap:12px}
.header-title h1{font-size:18px;color:#fff}
.header-title p{font-size:13px;color:#94a3b8}
.btn{padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:600;font-size:14px;border:none;transition:all .2s}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}
.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.btn-primary:hover{opacity:.9}
.container{max-width:800px;margin:0 auto;padding:24px 16px}
.section-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:20px;margin-bottom:16px;border-left:4px solid var(--accent)}
.section-card h3{color:#fff;font-size:16px;margin-bottom:4px}
.section-card p{color:#94a3b8;font-size:13px}
.section-actions{display:flex;gap:8px;margin-top:12px}
.btn-section{padding:8px 18px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer}
.q-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin-bottom:16px;color:#111}
.q-card.correct{background:#dcfce7}
.q-card.wrong{background:#fee2e2}
.q-card .q-num{font-weight:600;font-size:15px;color:#374151;margin-bottom:8px}
.q-card .q-text{font-size:18px;color:#111;font-family:Georgia,serif;line-height:1.6;margin-bottom:16px}
.q-card input[type=text]{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #d1d5db;font-size:16px;box-sizing:border-box}
.mc-btn{display:block;width:100%;padding:10px 16px;border-radius:8px;border:1px solid #d1d5db;background:#f9fafb;cursor:pointer;text-align:left;font-size:15px;margin-bottom:8px;transition:all .2s}
.mc-btn.selected{border:2px solid #3b82f6;background:#dbeafe}
.result-correct{color:#16a34a;font-weight:600;margin-top:12px}
.result-wrong{color:#dc2626;font-weight:600;margin-top:12px}
.hint{color:#6b7280;font-size:14px;font-style:italic;margin-top:4px}
.progress{background:rgba(255,255,255,.1);border-radius:8px;height:6px;margin-top:12px}
.progress-fill{background:#6366f1;border-radius:8px;height:6px;transition:width .3s}
.score-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:13px;color:#fff;margin-top:8px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px}
.stat{background:rgba(255,255,255,.05);border-radius:10px;padding:16px;text-align:center}
.stat .val{font-size:24px;font-weight:700}
.stat .label{color:#94a3b8;font-size:13px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;padding:28px;max-width:700px;width:100%;max-height:80vh;overflow-y:auto;color:#111}
.modal h2{font-size:22px;margin-bottom:20px}
.modal h3{color:#4b5563;border-bottom:2px solid #e5e7eb;padding-bottom:6px;margin-bottom:10px;margin-top:16px}
.formula-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.formula-item{background:#f3f4f6;padding:8px 12px;border-radius:6px;font-family:monospace;font-size:14px}
.final-score{background:rgba(255,255,255,.05);border-radius:12px;padding:24px;margin-bottom:16px;text-align:center}
.final-score .big{font-size:42px;font-weight:700}
.final-score .sub{color:#94a3b8}
.center{display:flex;gap:12px;justify-content:center}
</style>
</head>

"0.1":[
()=>{const types=["rational","irrational","integer","whole","prime","even integer"];const t=pick(types);const nums=[rand(-9,9),rand(-9,-1),`${rand(1,9)}/${rand(2,9)}`,`ГўВҲВҡ${pick([2,3,5,7,11])}`,"0","ГҸВҖ",String(rand(2,20))];const n=pick(nums);const isR=v=>!v.includes("ГўВҲВҡ")&&v!=="ГҸВҖ";const isIr=v=>v.includes("ГўВҲВҡ")||v==="ГҸВҖ";const isInt=v=>!v.includes("/")&&!v.includes("ГўВҲВҡ")&&v!=="ГҸВҖ"&&Number.isInteger(Number(v));const isW=v=>isInt(v)&&Number(v)>=0;const isP=v=>{const x=Number(v);if(!Number.isInteger(x)||x<2)return false;for(let i=2;i*i<=x;i++)if(x%i===0)return false;return true};const isE=v=>isInt(v)&&Number(v)%2===0;const c={"rational":isR,"irrational":isIr,"integer":isInt,"whole":isW,"prime":isP,"even integer":isE};return{question:`Is ${n} a ${t} number?`,answer:c[t](n)?"Yes":"No",choices:["Yes","No"],type:"mc",hint:`Think about the definition of ${t} numbers.`}},

()=>{const a=rand(-8,0),b=rand(1,8);if(Math.random()>.5)return{question:`Union: x < ${a} or x ГўВүВҘ ${b}`,answer:`(-ГўВҲВһ, ${a}) ГўВҲВӘ [${b}, ГўВҲВһ)`,type:"input",hint:"'or' = union ГўВҲВӘ"};return{question:`Intersection: x ГўВүВҘ ${a} and x < ${b}`,answer:`[${a}, ${b})`,type:"input",hint:"'and' = overlap"}},

()=>{const v=pick(["x","y","a","b"]),a=rand(2,8),b=rand(2,8);return{question:`Simplify: ${v}^${a} ГӮВ· ${v}^${b}`,answer:`${v}^${a+b}`,type:"input",hint:"Multiply same base: ADD exponents"}},

()=>{const v=pick(["x","y","a","r"]),a=rand(2,5),b=rand(2,4);return{question:`Simplify: (${v}^${a})^${b}`,answer:`${v}^${a*b}`,type:"input",hint:"Power of power: MULTIPLY exponents"}},
()=>{const v=pick(["x","y","a"]),n=rand(2,6);return{question:`No neg exponents: ${v}^(-${n})`,answer:`1/${v}^${n}`,type:"input",hint:"x^(-n) = 1/x^n"}},

()=>{const a=rand(2,9),b=rand(2,9);return{question:`Rationalize: ${a}/ГўВҲВҡ${b}`,answer:`${a}ГўВҲВҡ${b}/${b}`,type:"input",hint:`Multiply by ГўВҲВҡ${b}/ГўВҲВҡ${b}`}},

()=>{const t=pick([{e:()=>`${rand(2,9)}x^${rand(2,7)}`,t:"monomial"},{e:()=>`${rand(2,9)}x^${rand(2,5)} + ${rand(1,8)}`,t:"binomial"},{e:()=>`${rand(1,5)}xГӮВІ + ${rand(1,5)}x + ${rand(1,9)}`,t:"trinomial"}]);return{question:`Classify: "${t.e()}"`,answer:t.t,choices:["monomial","binomial","trinomial"],type:"mc",hint:"1 term=mono, 2=bi, 3=tri"}},
()=>{const a=rand(1,5),b=rand(1,5),c=rand(1,5),d=rand(1,5);return{question:`Simplify: (${a}xГӮВІ + ${b}x) + (${c}xГӮВІ + ${d}x)`,answer:`${a+c}xГӮВІ + ${b+d}x`,type:"input",hint:"Combine like terms"}},

()=>{let p=rand(-9,9),q=rand(-9,9);if(p===0)p=2;if(q===0)q=3;const b=p+q,c=p*q;const bs=b>=0?`+ ${b}`:`- ${Math.abs(b)}`,cs=c>=0?`+ ${c}`:`- ${Math.abs(c)}`;const ps=p>=0?`+ ${p}`:`- ${Math.abs(p)}`,qs=q>=0?`+ ${q}`:`- ${Math.abs(q)}`;return{question:`Factor: xГӮВІ ${bs}x ${cs}`,answer:`(x ${ps})(x ${qs})`,type:"input",hint:`Two nums: multiply to ${c}, add to ${b}`}},

()=>{const a=rand(2,8),b=rand(1,15);return{question:`Solve: ${a}x ГўВүВӨ ${b}. Give interval notation.`,answer:`(-ГўВҲВһ, ${b/a}]`,type:"input",hint:`x ГўВүВӨ ${b}/${a}`}},
()=>{const a=rand(-5,-2),b=rand(1,10);return{question:`Solve: ${a}x < ${b}. (Remember: flip inequality!)`,answer:`(${Math.ceil(-b/a)}, ГўВҲВһ)`,type:"input",hint:"Divide by negative ГўВҶВ’ flip the sign!"}},
()=>{const a=rand(1,5),b=rand(1,10),c=rand(1,5),d=rand(1,10);return{question:`Solve: ${a}x + ${b} > ${c}x + ${d}`,answer:b>d?`(${Math.ceil((d-b)/(a-c))}, ГўВҲВһ)`:`(${(d-b)/(a-c)}, ГўВҲВһ)`,type:"input",hint:"Get x on one side, constants on the other"}},
()=>{const a=rand(-5,0),b=rand(1,8);return{question:`Write in interval notation: ${a} ГўВүВӨ x < ${b}`,answer:`[${a}, ${b})`,type:"input",hint:"ГўВүВӨ means [, < means )"}},
()=>{const a=rand(2,6),b=rand(1,10),c=rand(11,20);return{question:`Solve: ${b} < ${a}x + ${b} < ${c}`,answer:`(0, ${(c-b)/a})`,type:"input",hint:"Subtract ${b} from all three parts, then divide by ${a}"}},
()=>{const a=rand(2,5),b=rand(1,8);return{question:`Solve: -${a}x ГўВүВҘ ${b}. Give interval notation.`,answer:`(-ГўВҲВһ, ${-b/a}]`,type:"input",hint:`Divide by -${a}, flip: x ГўВүВӨ ${-b/a}`}}
],
"1.8":[
()=>{return{question:"If x < 0, then |x| = ?",answer:"-x",type:"input",hint:"When x is negative, |x| = -x (makes it positive)"}},
()=>{const a=rand(1,8),b=rand(1,15);const x1=(b-a),x2=(-b-a);return{question:`Solve: |x + ${a}| = ${b}`,answer:`${x1}, ${x2}`,type:"input",hint:`x+${a} = ${b} or x+${a} = -${b}`}},
()=>{const a=rand(2,6),b=rand(1,10),c=rand(1,15);const v1=c-b,v2=-c-b;return{question:`Solve: |${a}x + ${b}| = ${c}`,answer:`${(v1)/a}, ${(v2)/a}`,type:"input",hint:`${a}x+${b} = ${c} or ${a}x+${b} = -${c}`}},
()=>{const a=rand(1,9);return{question:`Solve: |x + ${a}| = 0`,answer:String(-a),type:"input",hint:"|expr| = 0 means expr = 0"}},
()=>{const a=rand(1,8);return{question:`Solve: |x - ${a}| = |x + ${a}|`,answer:"0",type:"input",hint:"Set up two cases: x-a = x+a or x-a = -(x+a)"}},
()=>{const a=rand(1,6),k=rand(2,8);return{question:`Solve |x - ${a}| < ${k}. Interval notation.`,answer:`(${a-k}, ${a+k})`,type:"input",hint:`|x-${a}| < ${k} means ${a-k} < x < ${a+k}`}},
()=>{const a=rand(1,6),k=rand(2,8);return{question:`Solve |x - ${a}| ГўВүВҘ ${k}. Interval notation.`,answer:`(-ГўВҲВһ, ${a-k}] ГўВҲВӘ [${a+k}, ГўВҲВһ)`,type:"input",hint:`|x-${a}| ГўВүВҘ ${k} means x ГўВүВӨ ${a-k} or x ГўВүВҘ ${a+k}`}},
()=>{return{question:`Solve: |2x - 5| < -3`,answer:"no solution",choices:["no solution","all reals","(-1, 4)"],type:"mc",hint:"Absolute value is always ГўВүВҘ 0, can never be < negative"}}
],

()=>{const pairs=[["-2","1"],["1","-2"],["0","2"],["0","5"]];const isFunc=false;return{question:`Is {(-2,1),(1,-2),(0,2),(0,5)} a function?`,answer:"No",choices:["Yes","No"],type:"mc",hint:"x=0 maps to both 2 and 5 ГўВҶВ’ not a function"}},
()=>{return{question:`yГӮВІ = x + 4. Is y a function of x?`,answer:"No",choices:["Yes","No"],type:"mc",hint:"yГӮВІ = ... means two y-values (ГӮВұГўВҲВҡ). Not a function."}},
()=>{return{question:`y = |x - 3| + 1. Is y a function of x?`,answer:"Yes",choices:["Yes","No"],type:"mc",hint:"Each x gives exactly one y. It's a function."}},
()=>{const a=rand(2,8);return{question:`Find domain of f(x) = ${a}x - ${rand(1,10)}`,answer:"(-ГўВҲВһ, ГўВҲВһ)",type:"input",hint:"Linear function ГўВҶВ’ domain is all reals"}},
()=>{const a=rand(1,8);return{question:`Find domain of f(x) = ГўВҲВҡ(x - ${a})`,answer:`[${a}, ГўВҲВһ)`,type:"input",hint:`Need x - ${a} ГўВүВҘ 0, so x ГўВүВҘ ${a}`}},
()=>{const a=rand(1,8);return{question:`Find domain of f(x) = 1/(x - ${a})`,answer:`(-ГўВҲВһ, ${a}) ГўВҲВӘ (${a}, ГўВҲВһ)`,type:"input",hint:`Denom ГўВүВ  0, so x ГўВүВ  ${a}`}},
()=>{const a=rand(1,6),b=rand(1,10);const fa=a*a-b;return{question:`f(x) = xГӮВІ - ${b}. Find f(${a}).`,answer:String(fa),type:"input",hint:`f(${a}) = ${a}ГӮВІ - ${b} = ${fa}`}},
()=>{const a=rand(2,7),b=rand(1,9);return{question:`f(x) = ${a}x + ${b}. Difference quotient = ?`,answer:String(a),type:"input",hint:`[f(x+h)-f(x)]/h = [${a}(x+h)+${b} - (${a}x+${b})]/h = ${a}h/o = ${a}`}}
]
};

const sections={"0.1":{title:"0.1: Real Numbers & Intervals",color:"#3b82f6",topics:"Number types, interval notation, absolute value, distance"},"0.2":{title:"0.2: Exponents",color:"#8b5cf6",topics:"Exponent rules, simplifying, evaluating"},"0.3":{title:"0.3: Radicals & Rational Exponents",color:"#ec4899",topics:"Roots, rational exponents, rationalizing"},"0.4":{title:"0.4: Polynomials",color:"#f59e0b",topics:"Operations, FOIL, special products"},"0.5":{title:"0.5: Factoring",color:"#10b981",topics:"GCF, grouping, trinomials, cubes"},"0.6":{title:"0.6: Rational Expressions",color:"#14b8a6",topics:"Simplify, multiply, divide, add/subtract, LCD"},"1.1":{title:"1.1: Linear Equations",color:"#f43f5e",topics:"Solve, classify: conditional/identity/contradiction"},"1.2":{title:"1.2: Applications of Linear Eq",color:"#a855f7",topics:"Number, investment, shared-work, mixture, motion"},"1.7":{title:"1.7: Inequalities",color:"#0ea5e9",topics:"Solve linear inequalities, interval notation, flip rule"},"1.8":{title:"1.8: Absolute Value",color:"#d946ef",topics:"Abs value equations & inequalities, interval notation"},"2.1":{title:"2.1: Functions",color:"#f97316",topics:"Relations, domain, evaluate, difference quotient"}};

const formulas=[{title:"Exponent Rules",items:["x^a ГӮВ· x^b = x^(a+b)","x^a / x^b = x^(a-b)","(x^a)^b = x^(ab)","x^0 = 1","x^(-n) = 1/x^n"]},{title:"Special Products",items:["(a+b)ГӮВІ = aГӮВІ + 2ab + bГӮВІ","(a-b)ГӮВІ = aГӮВІ - 2ab + bГӮВІ","(a+b)(a-b) = aГӮВІ - bГӮВІ"]},{title:"Factoring",items:["aГӮВІ-bГӮВІ = (a+b)(a-b)","aГӮВІ+2ab+bГӮВІ = (a+b)ГӮВІ","aГӮВІ-2ab+bГӮВІ = (a-b)ГӮВІ","aГӮВі+bГӮВі = (a+b)(aГӮВІ-ab+bГӮВІ)","aГӮВі-bГӮВі = (a-b)(aГӮВІ+ab+bГӮВІ)"]},{title:"Radicals",items:["a^(m/n) = ГўВҒВҝГўВҲВҡ(a^m)","ГўВҲВҡaГӮВ·ГўВҲВҡb = ГўВҲВҡ(ab)","ГўВҲВҡa/ГўВҲВҡb = ГўВҲВҡ(a/b)"]},{title:"Intervals",items:["( = open","[ = closed","ГўВҲВһ always gets )","ГўВҲВӘ = or, ГўВҲВ© = and"]},{title:"Absolute Value",items:["|x| = x if xГўВүВҘ0, -x if x<0","|a| = k ГўВҶВ’ a=k or a=-k","|a| < k ГўВҶВ’ -k < a < k","|a| > k ГўВҶВ’ a<-k or a>k","|a| = |b| ГўВҶВ’ a=b or a=-b"]},{title:"Functions",items:["Domain: all valid x inputs","ГўВҲВҡ(expr): expr ГўВүВҘ 0","1/expr: expr ГўВүВ  0","Diff Quot: [f(x+h)-f(x)]/h"]},{title:"Linear Equations",items:["Conditional: one solution","Identity: all reals (0=0)","Contradiction: no sol (0=5)","d=rГӮВ·t, I=PГӮВ·rГӮВ·t"]}];

let state={view:"menu",section:null,questions:[],answers:{},showResults:false,showFormulas:false,scores:{"0.1":null,"0.2":null,"0.3":null,"0.4":null,"0.5":null,"0.6":null,"1.1":null,"1.2":null,"1.7":null,"1.8":null,"2.1":null},mode:"practice"};

function gen(sec,count=8){const gs=generators[sec];const qs=[];for(let i=0;i<count;i++)qs.push(gs[i%gs.length]());return qs;}

function startSection(sec,exam=false){state.section=sec;state.mode=exam?"exam":"practice";state.questions=gen(sec,exam?12:8);state.answers={};state.showResults=false;state.view="quiz";render();}

function startFull(){const all=[];Object.keys(generators).forEach(s=>{const gs=generators[s];for(let i=0;i<4;i++)all.push(gs[i%gs.length]())});state.questions=shuffle(all);state.section="all";state.mode="exam";state.answers={};state.showResults=false;state.view="quiz";render();}

function setAnswer(i,v){state.answers[i]=v;render();}

function submit(){state.showResults=true;if(state.section&&state.section!=="all"){let c=0;state.questions.forEach((q,i)=>{if((state.answers[i]||"").toLowerCase().replace(/\s/g,"")===q.answer.toLowerCase().replace(/\s/g,""))c++});state.scores[state.section]=Math.round(c/state.questions.length*100);}render();}

function goMenu(){state.view="menu";render();}
function toggleFormulas(){state.showFormulas=!state.showFormulas;render();}

function render(){
const app=document.getElementById("app");
const answered=Object.keys(state.answers).length;

let html=``;

// Formula modal
if(state.showFormulas){
html+=`<div class="modal-overlay" onclick="toggleFormulas()"><div class="modal" onclick="event.stopPropagation()"><div style="display:flex;justify-content:space-between;align-items:center"><h2>Г°ВҹВ“ВӢ Formula Sheet</h2><button onclick="toggleFormulas()" style="background:none;border:none;font-size:24px;cursor:pointer">ГўВңВ•</button></div>`;
formulas.forEach(s=>{html+=`<h3>${s.title}</h3><div class="formula-grid">${s.items.map(i=>`<div class="formula-item">${i}</div>`).join("")}</div>`});
html+=`</div></div>`;
}

// Header
html+=`<div class="header"><div class="header-title"><span style="font-size:28px">Г°ВҹВ“Вҗ</span><div><h1>Math 0702 Study Hub</h1><p>Sections 0.1ГўВҖВ“2.1 ГӮВ· Full Course Study</p></div></div><div style="display:flex;gap:10px"><button class="btn btn-ghost" onclick="toggleFormulas()">Г°ВҹВ“ВӢ Formulas</button>${state.view!=="menu"?`<button class="btn btn-ghost" onclick="goMenu()">ГўВҶВҗ Menu</button>`:""}</div></div>`;

html+=`<div class="container">`;

if(state.view==="menu"){
html+=`<div style="text-align:center;margin-bottom:32px"><h1 style="font-size:32px;margin-bottom:8px">Г°ВҹВҺВҜ Math 0702 Study Hub</h1><p style="color:#94a3b8;font-size:16px">Practice each section or take a full mock exam ГӮВ· Sections 0.1ГўВҖВ“2.1</p></div>`;

Object.entries(sections).forEach(([k,s])=>{
const score=state.scores[k];
const badge=score!==null?`<div class="score-badge" style="background:${score>=80?"#065f46":score>=60?"#92400e":"#991b1b"}">Last: ${score}%</div>`:"";
html+=`<div class="section-card" style="--accent:${s.color}"><h3>${s.title}</h3><p>${s.topics}</p>${badge}<div class="section-actions"><button class="btn-section" style="background:${s.color};color:#fff;border:none" onclick="startSection('${k}')">Practice</button><button class="btn-section" style="background:transparent;color:${s.color};border:1px solid ${s.color}" onclick="startSection('${k}',true)">Quiz</button></div></div>`;
});

html+=`<button class="btn btn-primary" style="width:100%;padding:16px 24px;font-size:18px;border-radius:12px;margin-top:8px" onclick="startFull()">Г°ВҹВҸВҶ Full Mock Exam (All Sections)</button>`;
html+=`<div class="stats"><div class="stat"><div class="val">11</div><div class="label">Sections</div></div><div class="stat"><div class="val">180+</div><div class="label">Question Types</div></div><div class="stat"><div class="val">0.1ГўВҖВ“2.1</div><div class="label">Coverage</div></div></div>`;
}

if(state.view==="quiz"){
const title=state.section==="all"?"Г°ВҹВҸВҶ Full Mock Exam":sections[state.section]?.title;
html+=`<div style="margin-bottom:20px"><h2 style="font-size:22px;margin-bottom:4px">${title}</h2><p style="color:#94a3b8;font-size:14px">${state.mode==="exam"?"Exam Mode":"Practice Mode"} ГӮВ· ${answered}/${state.questions.length} answered</p><div class="progress"><div class="progress-fill" style="width:${(answered/state.questions.length)*100}%"></div></div></div>`;

state.questions.forEach((q,i)=>{
const ua=state.answers[i]||"";
const isCorrect=state.showResults&&ua.toLowerCase().replace(/\s/g,"")===q.answer.toLowerCase().replace(/\s/g,"");
const cls=state.showResults?(isCorrect?"correct":"wrong"):"";

html+=`<div class="q-card ${cls}"><div class="q-num">Question ${i+1}</div><div class="q-text">${q.question}</div>`;

if(q.type==="mc"&&q.choices){
q.choices.forEach(c=>{
html+=`<button class="mc-btn ${ua===c?"selected":""}" onclick="${state.showResults?"":`setAnswer(${i},'${c.replace(/'/g,"\\'")}')`}">${c}</button>`;
});
}else{
html+=`<input type="text" value="${(ua||"").replace(/"/g,"&quot;")}" oninput="setAnswer(${i},this.value)" placeholder="Type your answer..." ${state.showResults?"disabled":""}/>`;
}

if(state.showResults){
html+=isCorrect?`<div class="result-correct">ГўВңВ“ Correct!</div>`:`<div class="result-wrong">ГўВңВ— Answer: ${q.answer}</div>`;
html+=`<div class="hint">Г°ВҹВ’ВЎ ${q.hint}</div>`;
}
html+=`</div>`;
});

if(!state.showResults){
html+=`<button class="btn btn-primary" style="width:100%;padding:16px;font-size:17px;border-radius:12px;margin-top:8px" onclick="submit()">ГўВңВ… Submit Answers</button>`;
}else{
const correct=state.questions.filter((q,i)=>(state.answers[i]||"").toLowerCase().replace(/\s/g,"")===q.answer.toLowerCase().replace(/\s/g,"")).length;
html+=`<div class="final-score"><div class="big">${correct}/${state.questions.length}</div><div class="sub">Correct</div></div>`;
html+=`<div class="center"><button class="btn btn-primary" onclick="startSection('${state.section==="all"?"0.1":state.section}')">Г°ВҹВ”В„ Try Again</button><button class="btn btn-ghost" onclick="goMenu()">ГўВҶВҗ Menu</button></div>`;
}
}

html+=`</div>`;
app.innerHTML=html;
}

render();
</script>
</body>
</html>
